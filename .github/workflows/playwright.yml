name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest

    - name: Start Supabase
      run: supabase start

    - name: Get Supabase Local Keys
      id: supabase_keys
      run: |
        # Wait for Supabase Auth to accept GET requests.
        # NOTE: --head (HEAD) is intentionally NOT used — GoTrue returns 405 for HEAD,
        # which makes curl --fail exit non-zero even when the service is fully running.
        echo "Waiting for Supabase Auth to be ready..."
        count=0
        until curl -sf http://127.0.0.1:54321/auth/v1/health > /dev/null; do
          if [ $count -ge 150 ]; then
            echo "ERROR: Supabase Auth did not become ready after 5 minutes."
            supabase status || true
            exit 1
          fi
          echo "  Still waiting... ($((count * 2))s elapsed)"
          sleep 2
          count=$((count + 1))
        done
        echo "Supabase Auth is ready."

        # Extract keys from human-readable status output (more reliable than JSON parsing)
        STATUS=$(supabase status 2>&1)
        ANON_KEY=$(echo "$STATUS" | grep "anon key" | awk '{print $NF}')
        SERVICE_ROLE_KEY=$(echo "$STATUS" | grep "service_role key" | awk '{print $NF}')

        if [ -z "$ANON_KEY" ] || [ -z "$SERVICE_ROLE_KEY" ]; then
          echo "ERROR: Failed to extract Supabase keys. Raw status output:"
          echo "$STATUS"
          exit 1
        fi

        echo "anon_key=${ANON_KEY}" >> $GITHUB_OUTPUT
        echo "service_role_key=${SERVICE_ROLE_KEY}" >> $GITHUB_OUTPUT

    - name: Run Playwright tests
      run: npx playwright test
      env:
        NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.supabase_keys.outputs.anon_key }}
        SUPABASE_SECRET_KEY: ${{ steps.supabase_keys.outputs.service_role_key }}
        STRIPE_SECRET_KEY: "sk_test_dummy"
        STRIPE_WEBHOOK_SECRET: "whsec_dummy"
        NEXT_PUBLIC_STRIPE_PRICE_ID: "price_dummy"
        RESEND_API_KEY: "re_dummy"
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
