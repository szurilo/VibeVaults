name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest

    - name: Start Supabase
      run: supabase start

    - name: Get Supabase Local Keys
      id: supabase_keys
      run: |
        # Wait for Auth service to be ready
        count=0
        until $(curl --output /dev/null --silent --head --fail http://127.0.0.1:54321/auth/v1/health); do
          if [ $count -gt 30 ]; then
            echo "Supabase Auth timed out"
            exit 1
          fi
          echo "Waiting for Supabase Auth..."
          sleep 2
          count=$((count+1))
        done

        # Extract keys safely, ignoring warnings/noise
        JSON=$(supabase status -o json | sed -n '/{/,/}/p')
        echo "anon_key=$(echo "$JSON" | jq -r '.ANON_KEY')" >> $GITHUB_OUTPUT
        echo "service_role_key=$(echo "$JSON" | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_OUTPUT

    - name: Run Playwright tests
      run: npx playwright test
      env:
        NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.supabase_keys.outputs.anon_key }}
        SUPABASE_SECRET_KEY: ${{ steps.supabase_keys.outputs.service_role_key }}
        STRIPE_SECRET_KEY: "sk_test_dummy"
        STRIPE_WEBHOOK_SECRET: "whsec_dummy"
        NEXT_PUBLIC_STRIPE_PRICE_ID: "price_dummy"
        RESEND_API_KEY: "re_dummy"
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
